name: Backend CI

on:
  push:
    paths:
      - "brandsoul/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "brandsoul/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brandsoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        shell: bash
        run: |
          mapfile -t py_files < <(find . -name "*.py" -not -path "./.venv/*" -not -path "./tests/__pycache__/*")
          python -m py_compile "${py_files[@]}"

      - name: Run pytest
        run: pytest tests -q -s
